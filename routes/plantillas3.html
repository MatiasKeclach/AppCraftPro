
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Logística - Colecta de Paquetes
</title>


<style>

/* =========================================
   RESET
========================================= */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:
        Arial,
        Helvetica,
        sans-serif;

}


/* =========================================
   BODY
========================================= */

body{

    background:#0f172a;

    color:white;

    padding:25px;

}


/* =========================================
   TITULO
========================================= */

h1{

    text-align:center;

    margin-bottom:20px;

}


/* =========================================
   DASHBOARD
========================================= */

.dashboard{

    display:grid;

    grid-template-columns:
        repeat(4,1fr);

    gap:15px;

    margin-bottom:25px;

}


.card{

    background:#1e293b;

    border-radius:10px;

    padding:20px;

    text-align:center;

}


.card h2{

    font-size:32px;

    color:#38bdf8;

}


/* =========================================
   FORMULARIOS
========================================= */

.formulario{

    background:#1e293b;

    padding:20px;

    border-radius:10px;

    margin-bottom:20px;

}


.grid{

    display:grid;

    grid-template-columns:
        repeat(2,1fr);

    gap:15px;

}


input,
select{

    width:100%;

    padding:10px;

    border:none;

    border-radius:6px;

    margin-top:5px;

}


button{

    padding:10px 18px;

    border:none;

    border-radius:6px;

    cursor:pointer;

    color:white;

    margin-top:15px;

}


button:disabled{

    opacity:0.6;

    cursor:not-allowed;

}


.guardar{

    background:#16a34a;

}


.exportar{

    background:#2563eb;

}


.buscar{

    width:100%;

    margin:20px 0;

}


/* =========================================
   TABLA
========================================= */

table{

    width:100%;

    border-collapse:collapse;

    background:#1e293b;

}


th{

    background:#2563eb;

    padding:10px;

}


td{

    padding:10px;

    text-align:center;

    border-bottom:
        1px solid #374151;

}


.editar{

    background:#eab308;

    color:black;

}


.eliminar{

    background:#dc2626;

}


.estado{

    color:#22c55e;

    font-weight:bold;

}


/* =========================================
   OCR
========================================= */

#estadoOCR{

    margin-top:15px;

    padding:10px;

    background:#0f172a;

    border-radius:6px;

    display:none;

}


#resultadoOCR{

    margin-top:10px;

    padding:10px;

    background:#020617;

    border-radius:6px;

    max-height:300px;

    overflow:auto;

    font-size:13px;

}


/* =========================================
   RESPONSIVE
========================================= */

@media(max-width:900px){

    .grid{

        grid-template-columns:1fr;

    }


    .dashboard{

        grid-template-columns:
            repeat(2,1fr);

    }


    table{

        font-size:12px;

    }

}

</style>

</head>


<body>


<h1>
    📦 Sistema de Colecta de Paquetes
</h1>


<!-- =========================================
     DASHBOARD
========================================= -->

<div class="dashboard">


    <div class="card">

        <h3>
            Total
        </h3>

        <h2 id="total">
            0
        </h2>

    </div>


    <div class="card">

        <h3>
            Pendientes
        </h3>

        <h2 id="pendientes">
            0
        </h2>

    </div>


    <div class="card">

        <h3>
            Asignados
        </h3>

        <h2 id="asignados">
            0
        </h2>

    </div>


    <div class="card">

        <h3>
            Entregados
        </h3>

        <h2 id="entregados">
            0
        </h2>

    </div>


</div>


<!-- =========================================
     AGREGAR PAQUETE MANUALMENTE
========================================= -->

<div class="formulario">


    <h3>
        📦 Agregar paquete manualmente
    </h3>


    <br>


    <div class="grid">


        <div>

            <label>
                Cliente
            </label>

            <input
                id="cliente"
                type="text"
            >

        </div>


        <div>

            <label>
                Código
            </label>

            <input
                id="codigo"
                type="text"
            >

        </div>


        <div>

            <label>
                Destinatario
            </label>

            <input
                id="destinatario"
                type="text"
            >

        </div>


        <div>

            <label>
                Dirección
            </label>

            <input
                id="direccion"
                type="text"
            >

        </div>


        <div>

            <label>
                Localidad
            </label>

            <input
                id="localidad"
                type="text"
            >

        </div>


        <div>

            <label>
                Chofer
            </label>


            <select id="chofer">


                <option>
                    Sin asignar
                </option>


                <option>
                    Lili
                </option>


                <option>
                    Sole
                </option>


                <option>
                    Ivan
                </option>


                <option>
                    Tomas
                </option>


                <option>
                    Pablo
                </option>


                <option>
                    Juanchi
                </option>

        </div>

    <button
        class="guardar"

        Agregar Paquete

</div>


<!-- =========================================
     IMPORTAR FOTOS
========================================= -->

<div class="formulario">


    <h3>
        📷 Importar etiquetas WhatsApp
    </h3>


    <p style="margin-top:10px;">

        Seleccioná una o varias fotos
        de etiquetas.

    </p>


    <input
        type="file"
        id="fotos"
        multiple
        accept="image/*"
        style="margin-top:15px;"
    >


    <br>


    <button
        id="btnOCR"
        class="guardar"
        onclick="procesarFotos()"
    >

        Leer etiquetas y crear paquetes

    </button>


    <div id="estadoOCR">

        Procesando OCR...

    </div>


    <div id="resultadoOCR"></div>


</div>


<!-- =========================================
     BUSCADOR
========================================= -->

<input
    class="buscar"
    id="buscar"
    placeholder="Buscar paquete..."
    onkeyup="mostrar()"
>


<!-- =========================================
     TABLA
========================================= -->

<table>


    <thead>


        <tr>


            <th>
                Cliente
            </th>


            <th>
                Código
            </th>


            <th>
                Destinatario
            </th>


            <th>
                Dirección
            </th>


            <th>
                Localidad
            </th>


            <th>
                Chofer
            </th>


            <th>
                Estado
            </th>


            <th>
                Acciones
            </th>


        </tr>


    </thead>


    <tbody id="tabla"></tbody>


</table>


<!-- =========================================
     TESSERACT OCR
========================================= -->

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<script>


// =========================================
// VARIABLES PRINCIPALES
// =========================================

let paquetes =
    JSON.parse(
        localStorage.getItem("paquetes")
    ) || [];


let procesandoOCR = false;


// =========================================
// ELEMENTOS HTML
// =========================================

const cliente =
    document.getElementById("cliente");


const codigo =
    document.getElementById("codigo");


const destinatario =
    document.getElementById("destinatario");


const direccion =
    document.getElementById("direccion");


const localidad =
    document.getElementById("localidad");


const chofer =
    document.getElementById("chofer");


const buscar =
    document.getElementById("buscar");


const tabla =
    document.getElementById("tabla");


const fotos =
    document.getElementById("fotos");


const btnOCR =
    document.getElementById("btnOCR");


const estadoOCR =
    document.getElementById("estadoOCR");


const resultadoOCR =
    document.getElementById("resultadoOCR");


// =========================================
// COMPROBAR TESSERACT
// =========================================

console.log(
    "Tesseract:",
    typeof Tesseract
);


// =========================================
// GUARDAR LOCAL
// =========================================

function guardarLocal(){

    localStorage.setItem(

        "paquetes",

        JSON.stringify(paquetes)

    );

}


// =========================================
// GUARDAR PAQUETE MANUAL
// =========================================

function guardar(){


    if(

        cliente.value.trim() === "" &&

        codigo.value.trim() === "" &&

        destinatario.value.trim() === "" &&

        direccion.value.trim() === "" &&

        localidad.value.trim() === ""

    ){

        alert(
            "Completá algún dato del paquete"
        );

        return;

    }


    let paquete = {


        cliente:
            cliente.value.trim(),


        codigo:
            codigo.value.trim(),


        destinatario:
            destinatario.value.trim(),


        direccion:
            direccion.value.trim(),


        localidad:
            localidad.value.trim(),


        chofer:
            chofer.value,


        estado:

            chofer.value === "Sin asignar"

                ? "Pendiente"

                : "Asignado",


        fecha:

            new Date()
                .toLocaleDateString("es-AR")


    };


    paquetes.push(paquete);


    guardarLocal();


    limpiar();


    mostrar();

}


// =========================================
// LIMPIAR FORMULARIO
// =========================================

function limpiar(){


    cliente.value = "";

    codigo.value = "";

    destinatario.value = "";

    direccion.value = "";

    localidad.value = "";

    chofer.selectedIndex = 0;


}


// =========================================
// MOSTRAR TABLA
// =========================================

function mostrar(){


    let texto =

        buscar.value
            .toLowerCase()
            .trim();


    tabla.innerHTML = "";


    let total = 0;

    let pendientes = 0;

    let asignados = 0;

    let entregados = 0;


    paquetes.forEach(

        (p, i) => {


            let contenido = (

                (p.cliente || "") +

                (p.codigo || "") +

                (p.destinatario || "") +

                (p.direccion || "") +

                (p.localidad || "") +

                (p.chofer || "") +

                (p.estado || "")

            ).toLowerCase();


            if(

                contenido.includes(texto)

            ){


                tabla.innerHTML += `

                <tr>

                    <td>
                        ${p.cliente || ""}
                    </td>

                    <td>
                        ${p.codigo || ""}
                    </td>

                    <td>
                        ${p.destinatario || ""}
                    </td>

                    <td>
                        ${p.direccion || ""}
                    </td>

                    <td>
                        ${p.localidad || ""}
                    </td>

                    <td>
                        ${p.chofer || ""}
                    </td>

                    <td class="estado">
                        ${p.estado || ""}
                    </td>

                    <td>

                        <button
                            class="editar"
                            onclick="editar(${i})"
                        >
                            Editar
                        </button>


                        <button
                            class="eliminar"
                            onclick="eliminarPaquete(${i})"
                        >
                            Eliminar
                        </button>

                    </td>

                </tr>

                `;

            }


            total++;


            if(
                p.estado === "Pendiente"
            ){

                pendientes++;

            }


            if(
                p.estado === "Asignado"
            ){

                asignados++;

            }


            if(
                p.estado === "Entregado"
            ){

                entregados++;

            }


        }

    );


    document
        .getElementById("total")
        .innerHTML = total;


    document
        .getElementById("pendientes")
        .innerHTML = pendientes;


    document
        .getElementById("asignados")
        .innerHTML = asignados;


    document
        .getElementById("entregados")
        .innerHTML = entregados;

}


// =========================================
// ELIMINAR
// =========================================

function eliminarPaquete(i){


    if(
        confirm(
            "¿Eliminar paquete?"
        )
    ){


        paquetes.splice(i, 1);


        guardarLocal();


        mostrar();


    }

}


// =========================================
// EDITAR
// =========================================

function editar(i){


    let p = paquetes[i];


    cliente.value =
        p.cliente || "";


    codigo.value =
        p.codigo || "";


    destinatario.value =
        p.destinatario || "";


    direccion.value =
        p.direccion || "";


    localidad.value =
        p.localidad || "";


    chofer.value =
        p.chofer ||
        "Sin asignar";


    paquetes.splice(i, 1);


    guardarLocal();


    mostrar();


}


// =========================================
// PROCESAR FOTOS OCR
// =========================================

async function procesarFotos(){


    if(procesandoOCR){

        alert(
            "Ya hay un proceso OCR funcionando. Esperá a que termine."
        );

        return;

    }


    if(

        !fotos.files ||

        fotos.files.length === 0

    ){

        alert(
            "Seleccioná al menos una foto."
        );

        return;

    }


    procesandoOCR = true;


    const listaFotos =

        Array.from(
            fotos.files
        );


    let creados = 0;

    let duplicados = 0;

    let errores = 0;


    resultadoOCR.innerHTML = "";


    estadoOCR.style.display =
        "block";


    estadoOCR.innerHTML =

        "⏳ Procesando " +

        listaFotos.length +

        " fotos...";


    btnOCR.disabled = true;


    btnOCR.innerText =
        "⏳ Procesando...";


    console.log(
        "INICIANDO OCR"
    );


    console.log(
        "Cantidad de fotos:",
        listaFotos.length
    );


    for(

        let i = 0;

        i < listaFotos.length;

        i++

    ){


        const foto =
            listaFotos[i];


        estadoOCR.innerHTML =

            "⏳ Procesando foto " +

            (i + 1) +

            " de " +

            listaFotos.length +

            ": " +

            foto.name;


        console.log(
            "Procesando:",
            foto.name
        );


        try{


            let resultado =

                await Tesseract.recognize(

                    foto,

                    "spa",

                    {

                        logger:

                            mensaje => {


                                if(

                                    mensaje.status ===
                                    "recognizing text"

                                ){

                                    console.log(

                                        foto.name,

                                        Math.round(

                                            mensaje.progress *

                                            100

                                        ) +

                                        "%"

                                    );

                                }

                            }

                    }

                );


            let texto =

                resultado.data.text || "";


            console.log(
                "================================"
            );


            console.log(
                "OCR:",
                foto.name
            );


            console.log(texto);


            console.log(
                "================================"
            );


            texto =

                limpiarTextoOCR(
                    texto
                );


            // =====================================
            // EXTRAER DATOS
            // =====================================

            let codigoDetectado =

                extraerCodigo(
                    texto
                );


            let destinatarioDetectado =

                extraerDestinatario(
                    texto
                );


            let direccionDetectada =

                extraerDireccion(
                    texto
                );


            let localidadDetectada =

                extraerLocalidad(
                    texto
                );


            // =====================================
            // SI NO HAY CODIGO
            // GENERAR CODIGO INTERNO
            // =====================================

            if(
                !codigoDetectado
            ){

                codigoDetectado =

                    generarCodigoInterno();

            }


            // =====================================
            // COMPROBAR DUPLICADO
            // =====================================

            let existe =

                paquetes.some(

                    p =>

                        p.codigo &&

                        p.codigo.toLowerCase() ===

                        codigoDetectado.toLowerCase()

                );


            if(existe){


                duplicados++;


                resultadoOCR.innerHTML += `

                <div style="
                    padding:8px;
                    margin-top:5px;
                    background:#78350f;
                    border-radius:5px;
                ">

                    ⚠️ ${foto.name}

                    → Duplicado:

                    ${codigoDetectado}

                </div>

                `;


                continue;

            }


            // =====================================
            // CREAR PAQUETE
            // =====================================

            let paquete = {


                cliente:

                    detectarCliente(
                        texto
                    ),


                codigo:

                    codigoDetectado,


                destinatario:

                    destinatarioDetectado,


                direccion:

                    direccionDetectada,


                localidad:

                    localidadDetectada,


                chofer:

                    "Sin asignar",


                estado:

                    "Pendiente",


                fecha:

                    new Date()
                        .toLocaleDateString(
                            "es-AR"
                        ),


                origen:

                    "OCR",


                textoOCR:

                    texto


            };


            paquetes.push(
                paquete
            );


            creados++;


            console.log(
                "PAQUETE CREADO:",
                paquete
            );


            resultadoOCR.innerHTML += `

            <div style="
                padding:8px;
                margin-top:5px;
                background:#14532d;
                border-radius:5px;
            ">

                ✅ ${foto.name}

                → Creado

                <br>

                Código:
                ${paquete.codigo}

                <br>

                Destinatario:
                ${paquete.destinatario || "No detectado"}

                <br>

                Dirección:
                ${paquete.direccion || "No detectada"}

                <br>

                Localidad:
                ${paquete.localidad || "No detectada"}

            </div>

            `;


        }

        catch(error){


            errores++;


            console.error(

                "Error procesando:",

                foto.name,

                error

            );


            resultadoOCR.innerHTML += `

            <div style="
                padding:8px;
                margin-top:5px;
                background:#7f1d1d;
                border-radius:5px;
            ">

                ❌ ${foto.name}

                → Error al procesar

            </div>

            `;


        }


    }


    // =====================================
    // GUARDAR
    // =====================================

    guardarLocal();


    mostrar();


    // =====================================
    // RESULTADO
    // =====================================

    estadoOCR.innerHTML =

        "✅ Proceso terminado.";


    alert(

        "Proceso terminado.\n\n" +

        "Fotos procesadas: " +

        listaFotos.length +

        "\n\n" +

        "Paquetes creados: " +

        creados +

        "\n\n" +

        "Duplicados: " +

        duplicados +

        "\n\n" +

        "Errores: " +

        errores

    );


    btnOCR.disabled = false;


    btnOCR.innerText =

        "Leer etiquetas y crear paquetes";


    procesandoOCR = false;


    // No borramos el selector
    // para que puedas volver a ver
    // qué fotos cargaste

}


// =========================================
// LIMPIAR TEXTO OCR
// =========================================

function limpiarTextoOCR(texto){


    return texto

        .replace(
            /\r/g,
            ""
        )

        .replace(
            /[“”"]/g,
            ""
        )

        .replace(
            /\t/g,
            " "
        )

        .split("\n")

        .map(

            linea =>

                linea
                    .trim()

        )

        .filter(

            linea =>

                linea.length > 0

        )

        .join("\n")

        .trim();

}


// =========================================
// EXTRAER CODIGO
// =========================================

function extraerCodigo(texto){


    if(!texto){

        return "";

    }


    let lineas =

        texto.split("\n");


    // =====================================
    // BUSCAR CODIGO CERCA DE ENVIO
    // =====================================

    for(

        let i = 0;

        i < lineas.length;

        i++

    ){


        let linea =

            lineas[i]

                .toLowerCase()

                .normalize("NFD")

                .replace(
                    /[\u0300-\u036f]/g,
                    ""
                );


        if(

            linea.includes("envio") ||

            linea.includes("envo") ||

            linea.includes("flex")

        ){


            let posibles =

                lineas[i].match(

                    /[A-Z0-9]{4,20}/gi

                );


            if(posibles){


                for(

                    let valor of posibles

                ){


                    if(

                        valor.length >= 4 &&

                        !/^\d{1,3}$/.test(
                            valor
                        )

                    ){

                        return valor
                            .toUpperCase();

                    }

                }

            }

        }

    }


    // =====================================
    // NUMEROS LARGOS
    // =====================================

    let numeros =

        texto.match(

            /\b\d{6,15}\b/g

        );


    if(

        numeros &&

        numeros.length > 0

    ){


        numeros.sort(

            (a,b) =>

                b.length -

                a.length

        );


        return numeros[0];

    }


    // =====================================
    // CODIGO ALFANUMERICO
    // =====================================

    let alfanumericos =

        texto.match(

            /\b[A-Z]{2,5}\d{3,15}\b/gi

        );


    if(

        alfanumericos &&

        alfanumericos.length > 0

    ){


        return alfanumericos[0]
            .toUpperCase();

    }


    return "";

}


// =========================================
// EXTRAER DESTINATARIO
// =========================================

function extraerDestinatario(texto){


    if(!texto){

        return "";

    }


    let lineas =

        texto.split("\n");


    for(

        let i = 0;

        i < lineas.length;

        i++

    ){


        let original =

            lineas[i].trim();


        let linea =

            original

                .toLowerCase();


        if(

            linea.includes(
                "destinatario"
            ) ||

            linea.includes(
                "destinatar"
            ) ||

            linea.includes(
                "jnatario"
            ) ||

            linea.includes(
                "natario"
            ) ||

            linea.includes(
                "destinatano"
            )

        ){


            // =================================
            // BUSCAR NOMBRE EN LA MISMA LINEA
            // =================================

            let nombre =

                original

                    .replace(

                        /.*?(destinatario|destinatar|jnatario|natario|destinatano)\s*[:\-]?\s*/i,

                        ""

                    )

                    .trim();


            if(

                nombre.length > 3

            ){


                return limpiarDato(
                    nombre
                );

            }


            // =================================
            // BUSCAR EN LINEAS SIGUIENTES
            // =================================

            for(

                let j = i + 1;

                j <

                Math.min(
                    i + 4,
                    lineas.length
                );

                j++

            ){


                let siguiente =

                    lineas[j].trim();


                if(

                    siguiente.length > 3 &&

                    !esEtiquetaCampo(
                        siguiente
                    )

                ){


                    return limpiarDato(
                        siguiente
                    );

                }

            }

        }

    }


    return "";

}


// =========================================
// EXTRAER DIRECCION
// =========================================

function extraerDireccion(texto){


    if(!texto){

        return "";

    }


    let lineas =

        texto.split("\n");


    // =====================================
    // BUSCAR CAMPO DIRECCION
    // =====================================

    for(

        let i = 0;

        i < lineas.length;

        i++

    ){


        let original =

            lineas[i].trim();


        let normalizada =

            original

                .toLowerCase()

                .normalize("NFD")

                .replace(
                    /[\u0300-\u036f]/g,
                    ""
                );


        if(

            normalizada.includes(
                "direccion"
            ) ||

            normalizada.includes(
                "reccion"
            ) ||

            normalizada.includes(
                "ccion"
            ) ||

            normalizada.includes(
                "direc"
            )

        ){


            let direccion =

                original

                    .replace(

                        /.*?(direccion|reccion|ccion|direc)\s*[:\-]?\s*/i,

                        ""

                    )

                    .trim();


            if(

                direccion.length > 3

            ){


                return limpiarDato(
                    direccion
                );

            }


            // =================================
            // SIGUIENTE LINEA
            // =================================

            if(

                lineas[i + 1] &&

                lineas[i + 1]
                    .trim()
                    .length > 3

            ){


                return limpiarDato(

                    lineas[i + 1]
                        .trim()

                );

            }

        }

    }


    // =====================================
    // BUSCAR POSIBLE DIRECCION
    // =====================================

    for(

        let linea of lineas

    ){


        let l =

            linea.trim();


        if(

            /\d{2,5}/.test(l) &&

            l.length > 5 &&

            l.length < 100

        ){


            let minuscula =

                l.toLowerCase();


            if(

                !minuscula.includes(
                    "cp:"
                ) &&

                !minuscula.includes(
                    "codigo"
                ) &&

                !minuscula.includes(
                    "envio"
                ) &&

                !minuscula.includes(
                    "pack"
                )

            ){


                return limpiarDato(l);

            }

        }

    }


    return "";

}


// =========================================
// EXTRAER LOCALIDAD
// =========================================

function extraerLocalidad(texto){


    if(!texto){

        return "";

    }


    let lineas =

        texto

            .split("\n")

            .map(

                linea =>

                    linea.trim()

            )

            .filter(

                linea =>

                    linea.length > 0

            );


    // =====================================
    // BUSCAR CABA
    // =====================================

    for(

        let i = 0;

        i < lineas.length;

        i++

    ){


        let linea =

            lineas[i]

                .toLowerCase();


        if(

            linea === "caba" ||

            linea.includes(
                "caba"
            )

        ){


            // La localidad suele estar
            // después de CABA

            if(

                lineas[i + 1]

            ){


                let posible =

                    lineas[i + 1]
                        .trim();


                if(

                    posible.length > 2 &&

                    !/^(cp|codigo|direccion|destinatario|referencia|envio)/i.test(
                        posible
                    )

                ){


                    return limpiarDato(
                        posible
                    );

                }

            }


            return "CABA";

        }

    }


    // =====================================
    // BUSCAR DESPUES DE CODIGO POSTAL
    // =====================================

    for(

        let i = 0;

        i < lineas.length;

        i++

    ){


        if(

            /^cp\s*:/i.test(
                lineas[i]
            ) ||

            /^c\.?p\.?\s*:/i.test(
                lineas[i]
            )

        ){


            // CP
            // CABA
            // LOCALIDAD

            if(

                lineas[i + 2]

            ){


                let posible =

                    lineas[i + 2]
                        .trim();


                if(

                    posible.length > 2 &&

                    !/^(direccion|destinatario|referencia|envio)/i.test(
                        posible
                    )

                ){


                    return limpiarDato(
                        posible
                    );

                }

            }

        }

    }


    // =====================================
    // FORMATO LOCALIDAD: XXXXX
    // =====================================

    for(

        let linea of lineas

    ){


        let coincidencia =

            linea.match(

                /(?:localidad|localidad de destino)\s*[:\-]\s*(.+)/i

            );


        if(coincidencia){


            return limpiarDato(

                coincidencia[1]

            );

        }

    }


    return "";

}

function detectarCliente(texto){

// GENERAR CODIGO INTERNO

function generarCodigoInterno(){


    let codigo;


    do{


        codigo =

            "OCR-" +

            Date.now() +

            "-" +

            Math.floor(

                Math.random() *

                1000

            );


    }

    while(

        paquetes.some(

            p =>

                p.codigo === codigo

        )

    );

// =========================================
// LIMPIAR DATO
// =========================================

function limpiarDato(valor){


    if(!valor){

        return "";

    }


    return valor

        .replace(

            /^[\s:;|.,\-]+/,

            ""

        )

        .replace(

            /[\s:;|.,\-]+$/,

            ""

        )

        .replace(

            /\s{2,}/g,

            " "

        )

        .trim();

}


// =========================================
// DETECTAR ETIQUETA DE CAMPO
// =========================================

function esEtiquetaCampo(texto){


    let t =

        texto

            .toLowerCase();


    return (

        t.includes(
            "direccion"
        ) ||

        t.includes(
            "destinatario"
        ) ||

        t.includes(
            "localidad"
        ) ||

        t.includes(
            "envio"
        ) ||

        t.includes(
            "codigo postal"
        ) ||

        t.includes(
            "referencia"
        ) ||

        t.includes(
            "cp:"
        )

    );

}
